# DO NOT USE IN PRODUCTION, THIS CONFIGURATION IS INTENTIONALLY INSECURE

# This compose file builds and runs the backend locally for development.
# Copy .env.example and fill out your Gamma Client credentials to get started.

name: strecklista-backend-dev

services:
    server:
        build:
            context: .
        container_name: strecklista-backend-dev-server
        restart: unless-stopped
        environment:
            NODE_ENV: development
            DATABASE_URL: postgresql://postgres:secret-dev-password@db:5432/strecklista
            JWT_SECRET: jwt-secret
        env_file: '.env'

        ports:
            - '8080:8080'

        depends_on:
            db:
                condition: service_healthy
    db:
        image: postgres:18
        container_name: strecklista-backend-dev-db
        restart: unless-stopped
        user: postgres
        environment:
            - POSTGRES_DB=strecklista
            - POSTGRES_PASSWORD=secret-dev-password

        ports:
            - '5432:5432'

        healthcheck:
            test: ['CMD', 'pg_isready']
            interval: 10s
            timeout: 5s
            retries: 5
